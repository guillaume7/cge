name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify build inputs
        run: |
          set -euo pipefail
          go test ./...

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          binary_dir="dist/cge_${GITHUB_REF_NAME}_linux_amd64"
          mkdir -p "$binary_dir/lib"
          kuzu_module_dir=$(go list -f '{{.Dir}}' -m github.com/kuzudb/go-kuzu)
          go build -trimpath -o "$binary_dir/graph.bin" ./cmd/graph
          cp "$kuzu_module_dir/lib/dynamic/linux-amd64/libkuzu.so" "$binary_dir/lib/libkuzu.so"
          cp README.md "$binary_dir/README.md"
          cat > "$binary_dir/graph" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          script_path="$(readlink -f -- "$0")"
          script_dir="$(CDPATH= cd -- "$(dirname -- "$script_path")" && pwd)"
          existing_ld_library_path="${LD_LIBRARY_PATH:-}"
          if [ -n "$existing_ld_library_path" ]; then
            export LD_LIBRARY_PATH="$script_dir/lib:$existing_ld_library_path"
          else
            export LD_LIBRARY_PATH="$script_dir/lib"
          fi
          exec "$script_dir/graph.bin" "$@"
          EOF
          chmod 0755 "$binary_dir/graph"
          tar -C dist -czf "dist/cge_${GITHUB_REF_NAME}_linux_amd64.tar.gz" "$(basename "$binary_dir")"
          sha256sum "dist/cge_${GITHUB_REF_NAME}_linux_amd64.tar.gz" > "dist/cge_${GITHUB_REF_NAME}_linux_amd64.tar.gz.sha256"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" \
              --title "$GITHUB_REF_NAME" \
              --notes "Initial VP1 MVP release of the Cognitive Graph Engine CLI."
          fi
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 --clobber
